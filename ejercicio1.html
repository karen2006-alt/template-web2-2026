<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-" crossorigin="anonymous">
    <style>
        .card {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
        <img src="logo.png" alt="Logo" style="height: 50px;">
        <button style="padding: 8px 16px; font-size: 1rem;">Click Me</button>
    </header>
    
    <main class="container my-4">
        <div class="d-flex flex-column align-items-center">
            <!-- Card 1 -->
            <div class="card mb-4" style="width: 20rem;">
                <img src="producto-a.jpg" class="card-img-top" alt="Producto A">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Producto A</h5>
                    <p class="card-text">Breve descripción del producto A.</p>
                    <a href="#" class="btn btn-primary mt-auto">Comprar ahora</a>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="card mb-4" style="width: 20rem;">
                <img src="producto-b.jpg" class="card-img-top" alt="Producto B">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Producto B</h5>
                    <p class="card-text">Breve descripción del producto B.</p>
                    <a href="#" class="btn btn-primary mt-auto">Comprar ahora</a>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="card mb-4" style="width: 20rem;">
                <img src="producto-c.jpg" class="card-img-top" alt="Producto C">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Producto C</h5>
                    <p class="card-text">Breve descripción del producto C.</p>
                    <a href="#" class="btn btn-primary mt-auto">Comprar ahora</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Categories section -->
    <section class="container my-5">
        <h2 class="text-center mb-4">Categorías</h2>
        <div class="row g-4">
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card">
                    <img src="cat1.jpg" class="card-img-top" alt="Categoría 1">
                    <div class="card-body text-center">
                        <h6 class="card-title mb-0">Categoría 1</h6>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card">
                    <img src="cat2.jpg" class="card-img-top" alt="Categoría 2">
                    <div class="card-body text-center">
                        <h6 class="card-title mb-0">Categoría 2</h6>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card">
                    <img src="cat3.jpg" class="card-img-top" alt="Categoría 3">
                    <div class="card-body text-center">
                        <h6 class="card-title mb-0">Categoría 3</h6>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card">
                    <img src="cat4.jpg" class="card-img-top" alt="Categoría 4">
                    <div class="card-body text-center">
                        <h6 class="card-title mb-0">Categoría 4</h6>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card">
                    <img src="cat5.jpg" class="card-img-top" alt="Categoría 5">
                    <div class="card-body text-center">
                        <h6 class="card-title mb-0">Categoría 5</h6>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="card">
                    <img src="cat6.jpg" class="card-img-top" alt="Categoría 6">
                    <div class="card-body text-center">
                        <h6 class="card-title mb-0">Categoría 6</h6>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS (optional, for components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-" crossorigin="anonymous"></script>
</body>
</html>
